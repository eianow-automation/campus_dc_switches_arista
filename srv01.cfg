! device: srv01 (cEOSLab, EOS-4.33.0F-39050855.4330F (engineering build))
!
hostname srv01
!
no aaa root
!
username admin privilege 15 role network-admin secret admin
username arista privilege 15 secret arista
!
management api http-commands
   no shutdown
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model multi-agent
!
snmp-server contact "EIA Infrastructure Support"
!
spanning-tree mode rapid-pvst
no spanning-tree vlan-id 4094
!
system l1
   unsupported speed action error
   unsupported error-correction action error
!
management api gnmi
   transport grpc default
!
management api netconf
   transport ssh default
!
aaa authorization exec default local
!
! ============================================================
! VLAN Definitions
! ============================================================
!
vlan 100
   name DATA
!
vlan 200
   name DATABASE
!
vlan 300
   name INFRA
!
vlan 400
   name STORAGE
!
vlan 500
   name DMZ
   
vlan 700
   name SERVER
!
vlan 4094
   name MLAG-PEER
   trunk group mlagpeer
!
no spanning-tree vlan-id 4094
!
! ============================================================
! VRF Definitions
! ============================================================
!
vrf instance management
!
vrf instance Intranet
!
! ============================================================
! Port-Channel Interfaces
! ============================================================
!
! Po1 - Uplink to cds01/cds02 MLAG pair (trunk carrying all VLANs)
! srv01 sees cds01+cds02 as a single LACP partner via MLAG
!   Eth2  -> cds01 Eth2  (cds01 Po1 mlag 1)
!   Eth18 -> cds02 Eth2  (cds02 Po1 mlag 1)
!
interface Port-Channel1
   description Uplink to cds01/cds02 MLAG
   switchport mode trunk
   switchport trunk allowed vlan 100-500
!
! Po5 - Dual-homed MLAG downlink to host1
! srv01 Eth5 -> host1 eth1 (host1 bonds eth1+eth2 via LACP)
!
interface Port-Channel5
   description MLAG to host1
   switchport access vlan 100
   mlag 5
!
! Po777 - MLAG Peer Link to srv02
!
interface Port-Channel777
   description MLAG Peer Link to srv02
   switchport mode trunk
   switchport trunk group mlagpeer
   mtu 9214
!
! ============================================================
! Physical Interfaces - MLAG Peer Link (Eth1, Eth17)
! ============================================================
!
interface Ethernet1
   description MLAG Peer Link to srv02
   channel-group 777 mode active
!
interface Ethernet17
   description MLAG Peer Link to srv02
   channel-group 777 mode active
!
! ============================================================
! Physical Interfaces - Uplink to cds MLAG pair (Eth2, Eth18)
! ============================================================
!
interface Ethernet2
   description Uplink to cds01 Eth2
   channel-group 1 mode active
!
interface Ethernet18
   description Uplink to cds02 Eth2
   channel-group 1 mode active
!
! ============================================================
! Physical Interfaces - Host-facing MLAG (Eth5)
! ============================================================
!
interface Ethernet5
   description Downlink to host1
   channel-group 5 mode active
!
! ============================================================
! Physical Interfaces - MLAG Keepalive (Eth48)
! ============================================================
!
interface Ethernet48
   description MLAG Keepalive to srv02
   no switchport
   ip address 192.168.249.1/24
!
! ============================================================
! Loopback & Management Interfaces
! ============================================================
!
interface Loopback0
   ip address 10.1.1.1/32
!
interface Management0
   description srv01_switch
   ip address 172.20.20.111/24
!
! ============================================================
! MLAG Peer SVI
! ============================================================
!
interface Vlan4094
   description MLAG Peer IP
   ip address 10.0.0.1/30
!
! ============================================================
! Routing
! ============================================================
!
ip routing
ip routing vrf management
ip routing vrf Intranet
!
! ============================================================
! MLAG Configuration
! ============================================================
!
interface Management0
   description srv01_switch
   vrf member management
   ip address 172.20.20.111/24


router ospf 100
   router-id 10.1.1.1
   passive-interface default
   no passive-interface Loopback0
   no passive-interface Port-Channel1
   network 10.1.1.1/32 area 100
   network 10.2.2.0/30 area 100
   vrf Intranet   
   
mlag configuration
   domain-id SRV-MLAG-DOMAIN
   local-interface Vlan4094
   peer-address 10.0.0.2
   peer-address heartbeat 192.168.249.2
   peer-link Port-Channel777
   dual-primary-detection delay-restore 300
   reload-delay mlag 300
   reload-delay non-mlag 330
!
end
