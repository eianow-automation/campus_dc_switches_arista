name: campus-dc-topo

prefix: lab

# mgmt:
#   network: mgmt
#   ipv4_subnet: 172.20.20.0/24

topology:
  kinds:
    ceos:
      image: ceos:latest

  nodes:
    srv01:
      kind: ceos
      mgmt-ipv4: 172.20.20.111
      startup-config: srv01.cfg
    srv02:
      kind: ceos
      mgmt-ipv4: 172.20.20.112
      startup-config: srv02.cfg

    cds01:
      kind: ceos
      mgmt-ipv4: 172.20.20.101
      startup-config: cds01.cfg
    cds02:
      kind: ceos
      mgmt-ipv4: 172.20.20.102
      startup-config: cds02.cfg

    host01:
      kind: linux
      mgmt-ipv4: 172.20.20.200
      image: alpine:latest
      exec:
        # Install full ip command (busybox ip lacks bond support)
        - apk add --no-cache iproute2
        # Create LACP bond
        - ip link add bond0 type bond mode 802.3ad miimon 100
        - bash -c 'echo fast > /sys/class/net/bond0/bonding/lacp_rate'
        - bash -c 'echo layer3+4 > /sys/class/net/bond0/bonding/xmit_hash_policy'
        # Flush and enslave members
        - ip addr flush dev eth1
        - ip addr flush dev eth2
        - ip link set eth1 down
        - ip link set eth1 master bond0
        - ip link set eth1 up
        - ip link set eth2 down
        - ip link set eth2 master bond0
        - ip link set eth2 up
        # Bring up bond and assign IP + gateway
        - ip link set bond0 up
        - ip addr add 10.1.7.10/24 dev bond0
        - ip route add default via 10.1.7.1

  links:
    - endpoints: [cds01:eth1, cds02:eth1]
    - endpoints: [srv01:eth1, srv02:eth1]
    - endpoints: [srv01:eth17, srv02:eth17]
    - endpoints: [srv01:eth48, srv02:eth48]
    - endpoints: [srv01:eth2, cds01:eth2]
    - endpoints: [srv01:eth18, cds02:eth2]
    - endpoints: [srv02:eth2, cds01:eth18]
    - endpoints: [srv02:eth18, cds02:eth18]
    - endpoints: [srv01:eth5, host01:eth1]
    - endpoints: [srv02:eth5, host01:eth2]
