hostname cdsXX
!
vrf instance Intranet
!
interface Management0
   description cdsXX_switch
   vrf member management
   ip address dhcp
!
ip routing
ip routing vrf Intranet
!
interface Ethernet1
   channel-group 1 mode active
interface Ethernet2
   channel-group 1 mode active
interface Port-Channel1
   description Downstream MLAG to SRV switches
   switchport trunk allowed vlan 95-99,322,324,542-544,610,620,750,804,890,899
   switchport mode trunk
!
router ospf 100
   router-id <router-id>
   passive-interface default
   no passive-interface Loopback0
   no passive-interface Port-Channel1
   network <loopback-ip>/32 area 100
   vrf Intranet
!
interface Loopback0
   ip address <loopback-ip>/32
!
