! Startup-config last modified at Wed Mar 18 16:35:00 2026 by root
! device: cds01 (cEOSLab, EOS-4.33.0F-39050855.4330F (engineering build))
!
no aaa root
!
username admin privilege 15 role network-admin secret admin
username arista privilege 15 secret arista
!
management api http-commands
   no shutdown
!
no service interface inactive port-id allocation disabled
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model multi-agent
!
hostname cds01
!
snmp-server contact "EIA Infrastructure Support"
!
spanning-tree mode rapid-pvst
no spanning-tree vlan-id 4094
!
system l1
   unsupported speed action error
   unsupported error-correction action error
!
! ============================================================
! VLAN Definitions
! ============================================================
!
vlan 100
   name DATA
!
vlan 200
   name VOICE
!
vlan 300
   name MANAGEMENT
!
vlan 400
   name STORAGE
!
vlan 500
   name DMZ
!
vlan 4094
   name MLAG-PEER
   trunk group mlagpeer
!
! ============================================================
! VRF Definitions
! ============================================================
!
vrf instance Intranet
!
vrf instance management
!
! ============================================================
! Management Protocols
! ============================================================
!
management api gnmi
   transport grpc default
!
management api netconf
   transport ssh default
!
aaa authorization exec default local
!
! ============================================================
! Port-Channel Interfaces
! ============================================================
!
! Po1 - Dual-sided MLAG to srv01/srv02 (MLAG ID 1)
interface Port-Channel1
   description MLAG to srv01/srv02
   switchport mode trunk
   switchport trunk allowed vlan 100-500
   mlag 1
!
! Po10 - Uplink to Core (routed)
interface Port-Channel10
   description Uplink to Core
   no switchport
   ip address 10.2.2.2/30
!
! Po12 - MLAG Peer Link
interface Port-Channel12
   description MLAG Peer Link
   mtu 9214
   switchport mode trunk
   switchport trunk group mlagpeer
!
! ============================================================
! Physical Interfaces
! ============================================================
!
! --- MLAG Peer Link Members (Eth1, Eth3) ---
!
interface Ethernet1
   description MLAG Peer Link to cds02
   channel-group 12 mode active
!
interface Ethernet3
   description MLAG Peer Link to cds02
   channel-group 12 mode active
!
! --- Server MLAG Members (Eth2, Eth18) -> Po1 ---
!
interface Ethernet2
   description MLAG to srv01/srv02
   channel-group 1 mode active
!
interface Ethernet18
   description MLAG to srv01/srv02
   channel-group 1 mode active
!
! --- MLAG Keepalive Link ---
!
interface Ethernet48
   description MLAG Keepalive
   no switchport
   ip address 192.168.248.2/24
!
! ============================================================
! Loopback & Management Interfaces
! ============================================================
!
interface Loopback0
   ip address 1.1.1.1/32
!
interface Management0
   ip address 172.20.20.113/24
   ipv6 address 3fff:172:20:20::8/64
!
! ============================================================
! SVI Interfaces
! ============================================================
!
interface Vlan100
   description DATA - 192.168.1.0/24
   ip address 192.168.1.2/24
   ip virtual-router address 192.168.1.1
!
interface Vlan200
   description VOICE - 192.168.2.0/24
   ip address 192.168.2.2/24
   ip virtual-router address 192.168.2.1
!
interface Vlan300
   description MANAGEMENT - 192.168.3.0/24
   ip address 192.168.3.2/24
   ip virtual-router address 192.168.3.1
!
interface Vlan400
   description STORAGE - 192.168.4.0/24
   ip address 192.168.4.2/24
   ip virtual-router address 192.168.4.1
!
interface Vlan500
   description DMZ - 192.168.5.0/24
   ip address 192.168.5.2/24
   ip virtual-router address 192.168.5.1
!
! MLAG Peer SVI
interface Vlan4094
   description MLAG Peer IP
   ip address 10.0.0.2/30
!
! ============================================================
! Virtual Router MAC (required for MLAG + VARP)
! ============================================================
!
ip virtual-router mac-address 00:1c:73:00:00:99
!
! ============================================================
! Routing
! ============================================================
!
ip routing
ip routing vrf Intranet
ip routing vrf management
!
! ============================================================
! MLAG Configuration
! ============================================================
!
mlag configuration
   domain-id MLAG-DOMAIN
   local-interface Vlan4094
   peer-address 10.0.0.1
   peer-address heartbeat 192.168.248.1
   peer-link Port-Channel12
   reload-delay mlag 300
   reload-delay non-mlag 330
!
! ============================================================
! Multicast
! ============================================================
!
router multicast
   ipv4
      software-forwarding kernel
   !
   ipv6
      software-forwarding kernel
!
! ============================================================
! OSPF Configuration - ABR (Area 0 + Area 0.0.0.100)
! ============================================================
!
router ospf 100
   router-id 1.1.1.1
   passive-interface default
   no passive-interface Loopback0
   no passive-interface Port-Channel10
   no passive-interface Vlan100
   no passive-interface Vlan200
   no passive-interface Vlan300
   no passive-interface Vlan400
   no passive-interface Vlan500
   !
   ! Area 0 - Backbone (loopback + core uplink)
   network 1.1.1.1/32 area 0.0.0.0
   network 10.2.2.0/30 area 0.0.0.0
   !
   ! Area 100 - User/service networks
   network 192.168.1.0/24 area 0.0.0.100
   network 192.168.2.0/24 area 0.0.0.100
   network 192.168.3.0/24 area 0.0.0.100
   network 192.168.4.0/24 area 0.0.0.100
   network 192.168.5.0/24 area 0.0.0.100
   !
   max-lsa 12000
!
end
